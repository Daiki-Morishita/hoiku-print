<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <!-- 3歳向け・ぞうとおはな -->

  <!-- おはな（左上） -->
  <circle cx="65" cy="75" r="20" fill="white" stroke="#222" stroke-width="8"/>
  <circle cx="45" cy="55" r="20" fill="white" stroke="#222" stroke-width="8"/>
  <circle cx="85" cy="55" r="20" fill="white" stroke="#222" stroke-width="8"/>
  <circle cx="65" cy="40" r="20" fill="white" stroke="#222" stroke-width="8"/>
  <circle cx="65" cy="62" r="16" fill="white" stroke="#222" stroke-width="6"/>
  <!-- おはなの茎 -->
  <line x1="65" y1="95" x2="65" y2="135" stroke="#222" stroke-width="8" stroke-linecap="round"/>
  <!-- 葉っぱ -->
  <ellipse cx="50" cy="118" rx="18" ry="10" fill="white" stroke="#222" stroke-width="7" transform="rotate(-30 50 118)"/>

  <!-- からだ -->
  <ellipse cx="215" cy="355" rx="130" ry="105" fill="white" stroke="#222" stroke-width="11"/>

  <!-- あたま -->
  <circle cx="215" cy="185" r="98" fill="white" stroke="#222" stroke-width="11"/>

  <!-- ひだり耳 -->
  <ellipse cx="92" cy="178" rx="58" ry="70" fill="white" stroke="#222" stroke-width="11"/>

  <!-- みぎ耳 -->
  <ellipse cx="338" cy="178" rx="58" ry="70" fill="white" stroke="#222" stroke-width="11"/>

  <!-- ひだり目 -->
  <circle cx="178" cy="163" r="17" fill="#222"/>
  <circle cx="185" cy="157" r="6" fill="white"/>

  <!-- みぎ目 -->
  <circle cx="252" cy="163" r="17" fill="#222"/>
  <circle cx="259" cy="157" r="6" fill="white"/>

  <!-- はな（トランク） -->
  <path d="M190 228 Q165 272 182 318 Q193 344 215 344 Q237 344 248 318 Q265 272 240 228" fill="white" stroke="#222" stroke-width="11" stroke-linejoin="round"/>
  <ellipse cx="215" cy="340" rx="23" ry="16" fill="white" stroke="#222" stroke-width="9"/>

  <!-- しっぽ -->
  <path d="M342 330 Q370 310 365 345 Q362 358 348 355" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round"/>

  <!-- ひだりまえあし -->
  <ellipse cx="156" cy="452" rx="44" ry="26" fill="white" stroke="#222" stroke-width="11"/>

  <!-- みぎまえあし -->
  <ellipse cx="274" cy="452" rx="44" ry="26" fill="white" stroke="#222" stroke-width="11"/>
</svg>
