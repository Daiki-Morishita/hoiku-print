  </g>
  <g transform="translate(95, 250)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">う</text></g>
  <g transform="translate(175, 250)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">う</text></g>
  <g transform="translate(255, 250)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/></g>
  <g transform="translate(335, 250)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/></g>

  <!-- え -->
  <g transform="translate(15, 340)">
    <rect width="70" height="70" rx="6" fill="#F0F7FF" stroke="#5B9BD5" stroke-width="2"/>
    <line x1="35" y1="0" x2="35" y2="70" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="70" y2="35" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="35" y="56" font-family="serif" font-size="46" fill="#A0AEC0" text-anchor="middle" dominant-baseline="auto">え</text>
    <text x="8" y="18" font-family="sans-serif" font-size="12" fill="#5B9BD5" font-weight="bold">④</text>
  </g>
  <g transform="translate(95, 340)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">え</text></g>
  <g transform="translate(175, 340)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">え</text></g>
  <g transform="translate(255, 340)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/></g>
  <g transform="translate(335, 340)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/></g>

  <!-- お -->
  <g transform="translate(15, 430)">
    <rect width="70" height="70" rx="6" fill="#F0F7FF" stroke="#5B9BD5" stroke-width="2"/>
    <line x1="35" y1="0" x2="35" y2="70" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="70" y2="35" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="35" y="56" font-family="serif" font-size="46" fill="#A0AEC0" text-anchor="middle" dominant-baseline="auto">お</text>
    <text x="8" y="18" font-family="sans-serif" font-size="12" fill="#5B9BD5" font-weight="bold">⑤</text>
  </g>
  <g transform="translate(95, 430)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">お</text></g>
  <g transform="translate(175, 430)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">お</text></g>
  <g transform="translate(255, 430)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/></g>
  <g transform="translate(335, 430)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/></g>
