<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- 4〜6歳向け ひらがな「あいうえお」練習プリント -->

  <!-- タイトル -->
  <text x="200" y="40" font-family="sans-serif" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">あ行 なぞり書き練習</text>

  <!-- 書き順の説明 -->
  <text x="200" y="62" font-family="sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">なぞってみよう！</text>

  <!-- === あ === -->
  <g transform="translate(15, 70)">
    <rect width="70" height="70" rx="6" fill="#F0F7FF" stroke="#5B9BD5" stroke-width="2"/>
    <!-- ガイド線 -->
    <line x1="35" y1="0" x2="35" y2="70" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="70" y2="35" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
    <!-- あ（点線なぞり） -->
    <text x="35" y="56" font-family="serif" font-size="46" fill="#A0AEC0" text-anchor="middle" dominant-baseline="auto">あ</text>
    <text x="8" y="18" font-family="sans-serif" font-size="12" fill="#5B9BD5" font-weight="bold">①</text>
    <text x="55" y="68" font-family="sans-serif" font-size="10" fill="#888">あ</text>
  </g>

  <!-- なぞり「あ」×3 -->
  <g transform="translate(95, 70)">
    <rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">あ</text>
  </g>
  <g transform="translate(175, 70)">
    <rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">あ</text>
  </g>
  <!-- 自分で書く枠 -->
  <g transform="translate(255, 70)">
    <rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  <g transform="translate(335, 70)">
    <rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- === い === -->
  <g transform="translate(15, 160)">
    <rect width="70" height="70" rx="6" fill="#F0F7FF" stroke="#5B9BD5" stroke-width="2"/>
    <line x1="35" y1="0" x2="35" y2="70" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="70" y2="35" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="35" y="56" font-family="serif" font-size="46" fill="#A0AEC0" text-anchor="middle" dominant-baseline="auto">い</text>
    <text x="8" y="18" font-family="sans-serif" font-size="12" fill="#5B9BD5" font-weight="bold">②</text>
  </g>
  <g transform="translate(95, 160)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">い</text></g>
  <g transform="translate(175, 160)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><text x="35" y="56" font-family="serif" font-size="46" fill="#D1D9E0" text-anchor="middle" dominant-baseline="auto">い</text></g>
  <g transform="translate(255, 160)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/></g>
  <g transform="translate(335, 160)"><rect width="70" height="70" rx="6" fill="white" stroke="#CBD5E1" stroke-width="2"/><line x1="35" y1="0" x2="35" y2="70" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/><line x1="0" y1="35" x2="70" y2="35" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/></g>

  <!-- う -->
  <g transform="translate(15, 250)">
    <rect width="70" height="70" rx="6" fill="#F0F7FF" stroke="#5B9BD5" stroke-width="2"/>
    <line x1="35" y1="0" x2="35" y2="70" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="35" x2="70" y2="35" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="3,3"/>
