<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <!-- 2歳向け・太い線・シンプルなぞう（正面向き） -->

  <!-- からだ -->
  <ellipse cx="200" cy="360" rx="125" ry="100" fill="white" stroke="#222" stroke-width="12"/>

  <!-- あたま -->
  <circle cx="200" cy="185" r="100" fill="white" stroke="#222" stroke-width="12"/>

  <!-- ひだり耳（大きいまる） -->
  <ellipse cx="78" cy="178" rx="60" ry="72" fill="white" stroke="#222" stroke-width="12"/>

  <!-- みぎ耳（大きいまる） -->
  <ellipse cx="322" cy="178" rx="60" ry="72" fill="white" stroke="#222" stroke-width="12"/>

  <!-- ひだり目 -->
  <circle cx="163" cy="163" r="18" fill="#222"/>
  <circle cx="170" cy="157" r="6" fill="white"/>

  <!-- みぎ目 -->
  <circle cx="237" cy="163" r="18" fill="#222"/>
  <circle cx="244" cy="157" r="6" fill="white"/>

  <!-- はな（トランク） -->
  <path d="M175 228 Q152 270 168 315 Q178 340 200 340 Q222 340 232 315 Q248 270 225 228" fill="white" stroke="#222" stroke-width="11" stroke-linejoin="round"/>
  <ellipse cx="200" cy="336" rx="24" ry="16" fill="white" stroke="#222" stroke-width="9"/>

  <!-- ひだりまえあし -->
  <ellipse cx="143" cy="455" rx="43" ry="25" fill="white" stroke="#222" stroke-width="12"/>

  <!-- みぎまえあし -->
  <ellipse cx="257" cy="455" rx="43" ry="25" fill="white" stroke="#222" stroke-width="12"/>
</svg>
