<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" width="400" height="460">
  <!-- 2〜4歳向け かんたん迷路（どうぶつ編） -->

  <!-- 外枠 -->
  <rect x="20" y="60" width="360" height="360" rx="8" fill="white" stroke="#222" stroke-width="10"/>

  <!-- スタートラベル -->
  <text x="35" y="52" font-family="sans-serif" font-size="18" font-weight="bold" fill="#222">スタート</text>
  <text x="288" y="445" font-family="sans-serif" font-size="18" font-weight="bold" fill="#222">ゴール！</text>

  <!-- 迷路の壁 -->
  <!-- 横壁 -->
  <line x1="20" y1="150" x2="200" y2="150" stroke="#222" stroke-width="10" stroke-linecap="square"/>
  <line x1="260" y1="150" x2="380" y2="150" stroke="#222" stroke-width="10" stroke-linecap="square"/>

  <line x1="110" y1="240" x2="380" y2="240" stroke="#222" stroke-width="10" stroke-linecap="square"/>

  <line x1="20" y1="330" x2="230" y2="330" stroke="#222" stroke-width="10" stroke-linecap="square"/>
  <line x1="290" y1="330" x2="380" y2="330" stroke="#222" stroke-width="10" stroke-linecap="square"/>

  <!-- 縦壁 -->
  <line x1="110" y1="60" x2="110" y2="150" stroke="#222" stroke-width="10" stroke-linecap="square"/>
  <line x1="110" y1="240" x2="110" y2="330" stroke="#222" stroke-width="10" stroke-linecap="square"/>

  <line x1="200" y1="150" x2="200" y2="240" stroke="#222" stroke-width="10" stroke-linecap="square"/>

  <line x1="290" y1="60" x2="290" y2="150" stroke="#222" stroke-width="10" stroke-linecap="square"/>
  <line x1="290" y1="240" x2="290" y2="330" stroke="#222" stroke-width="10" stroke-linecap="square"/>

  <line x1="200" y1="330" x2="200" y2="420" stroke="#222" stroke-width="10" stroke-linecap="square"/>

  <!-- スタートのどうぶつ（うさぎ） -->
  <!-- うさぎのあたま -->
  <circle cx="62" cy="100" r="22" fill="white" stroke="#5B9BD5" stroke-width="7"/>
  <!-- 耳 -->
  <ellipse cx="52" cy="72" rx="7" ry="14" fill="white" stroke="#5B9BD5" stroke-width="6"/>
  <ellipse cx="72" cy="72" rx="7" ry="14" fill="white" stroke="#5B9BD5" stroke-width="6"/>
  <!-- め -->
  <circle cx="55" cy="98" r="4" fill="#5B9BD5"/>
  <circle cx="69" cy="98" r="4" fill="#5B9BD5"/>
  <!-- はな・くち -->
  <circle cx="62" cy="107" r="3" fill="#FF8C69"/>
  <path d="M55 112 Q62 118 69 112" fill="none" stroke="#5B9BD5" stroke-width="3"/>

  <!-- ゴールのどうぶつ（にんじん） -->
  <path d="M338 400 Q345 370 350 355 Q353 345 348 338 Q338 330 328 338 Q320 345 325 355 Q330 370 338 400Z"
        fill="white" stroke="#FF8C69" stroke-width="7"/>
  <path d="M330 338 Q325 320 328 310" fill="none" stroke="#6BBF7C" stroke-width="7" stroke-linecap="round"/>
  <path d="M338 335 Q336 316 340 306" fill="none" stroke="#6BBF7C" stroke-width="7" stroke-linecap="round"/>
  <path d="M346 338 Q348 320 352 312" fill="none" stroke="#6BBF7C" stroke-width="7" stroke-linecap="round"/>
</svg>
