<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <!-- 3〜5歳向け 運筆プリント（まっすぐ・なみ・ぐるぐる） -->

  <text x="200" y="32" font-family="sans-serif" font-size="19" font-weight="bold" fill="#222" text-anchor="middle">うんぴつ れんしゅう</text>
  <text x="200" y="54" font-family="sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">せんをなぞってみよう！</text>

  <!-- セクション1: まっすぐな線 -->
  <text x="30" y="84" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5B9BD5">① まっすぐな線</text>
  <!-- ガイドエリア -->
  <rect x="20" y="92" width="360" height="70" rx="8" fill="#F8FAFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- 中央線（点線） -->
  <line x1="30" y1="127" x2="370" y2="127" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- なぞり線 -->
  <line x1="50" y1="117" x2="350" y2="117" stroke="#D1D9E0" stroke-width="8" stroke-linecap="round"/>
  <!-- スタートマーク -->
  <circle cx="50" cy="117" r="9" fill="#5B9BD5"/>
  <text x="50" y="121" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">S</text>
  <!-- ゴールマーク -->
  <polygon points="350,108 360,117 350,126" fill="#FF8C69"/>

  <!-- セクション2: なみ線 -->
  <text x="30" y="183" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5B9BD5">② なみ線</text>
  <rect x="20" y="190" width="360" height="75" rx="8" fill="#F8FAFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="30" y1="227" x2="370" y2="227" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- なみ線なぞり -->
  <path d="M50,227 Q90,205 130,227 Q170,249 210,227 Q250,205 290,227 Q310,238 350,227"
        fill="none" stroke="#D1D9E0" stroke-width="8" stroke-linecap="round"/>
  <circle cx="50" cy="227" r="9" fill="#5B9BD5"/>
  <text x="50" y="231" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">S</text>
  <polygon points="350,218 360,227 350,236" fill="#FF8C69"/>

  <!-- セクション3: ざぐざぐ線 -->
  <text x="30" y="286" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5B9BD5">③ ざぐざぐ線</text>
  <rect x="20" y="293" width="360" height="75" rx="8" fill="#F8FAFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="30" y1="330" x2="370" y2="330" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  <polyline points="50,320 90,345 130,320 170,345 210,320 250,345 290,320 350,320"
        fill="none" stroke="#D1D9E0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="320" r="9" fill="#5B9BD5"/>
  <text x="50" y="324" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">S</text>
  <polygon points="350,311 360,320 350,329" fill="#FF8C69"/>

  <!-- セクション4: ぐるぐる -->
  <text x="30" y="390" font-family="sans-serif" font-size="14" font-weight="bold" fill="#5B9BD5">④ ぐるぐる</text>
  <rect x="20" y="397" width="360" height="100" rx="8" fill="#F8FAFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <!-- 渦巻き3つ -->
  <!-- 渦1 -->
  <path d="M80,447 Q80,430 95,430 Q110,430 110,447 Q110,462 92,462 Q76,462 76,444 Q76,428 97,428"
        fill="none" stroke="#D1D9E0" stroke-width="7" stroke-linecap="round"/>
  <!-- 渦2 -->
  <path d="M200,447 Q200,430 215,430 Q230,430 230,447 Q230,462 212,462 Q196,462 196,444 Q196,428 217,428"
        fill="none" stroke="#D1D9E0" stroke-width="7" stroke-linecap="round"/>
  <!-- 渦3 -->
  <path d="M320,447 Q320,430 335,430 Q350,430 350,447 Q350,462 332,462 Q316,462 316,444 Q316,428 337,428"
        fill="none" stroke="#D1D9E0" stroke-width="7" stroke-linecap="round"/>

  <text x="200" y="515" font-family="sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">ゆっくり ていねいに かこう</text>
</svg>
