<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- 3〜6歳向け クリスマスツリー ぬりえ -->

  <!-- 幹 -->
  <rect x="170" y="430" width="60" height="55" rx="6" fill="white" stroke="#222" stroke-width="10"/>

  <!-- ツリー下段 -->
  <polygon points="200,230 80,430 320,430"
           fill="white" stroke="#222" stroke-width="10" stroke-linejoin="round"/>

  <!-- ツリー中段 -->
  <polygon points="200,140 100,300 300,300"
           fill="white" stroke="#222" stroke-width="10" stroke-linejoin="round"/>

  <!-- ツリー上段 -->
  <polygon points="200,55 120,190 280,190"
           fill="white" stroke="#222" stroke-width="10" stroke-linejoin="round"/>

  <!-- 星（頂点） -->
  <polygon points="200,18 207,38 228,38 212,50 218,70 200,58 182,70 188,50 172,38 193,38"
           fill="white" stroke="#222" stroke-width="8"/>

  <!-- 飾り（ボール）大 -->
  <circle cx="155" cy="310" r="16" fill="white" stroke="#222" stroke-width="8"/>
  <circle cx="245" cy="340" r="16" fill="white" stroke="#222" stroke-width="8"/>
  <circle cx="200" cy="370" r="16" fill="white" stroke="#222" stroke-width="8"/>
  <circle cx="130" cy="390" r="14" fill="white" stroke="#222" stroke-width="7"/>
  <circle cx="270" cy="395" r="14" fill="white" stroke="#222" stroke-width="7"/>

  <!-- 飾り（ボール）中段 -->
  <circle cx="155" cy="230" r="13" fill="white" stroke="#222" stroke-width="7"/>
  <circle cx="245" cy="240" r="13" fill="white" stroke="#222" stroke-width="7"/>

  <!-- 飾り（ボール）上段 -->
  <circle cx="175" cy="155" r="11" fill="white" stroke="#222" stroke-width="6"/>
  <circle cx="225" cy="165" r="11" fill="white" stroke="#222" stroke-width="6"/>
</svg>
