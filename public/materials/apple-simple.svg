<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" width="400" height="460">
  <!-- 2歳向け・太い線・シンプルなりんご -->

  <!-- は（みき） -->
  <path d="M200 80 Q215 50 235 45" fill="none" stroke="#222" stroke-width="11" stroke-linecap="round"/>

  <!-- は -->
  <ellipse cx="245" cy="48" rx="28" ry="18" fill="white" stroke="#222" stroke-width="10" transform="rotate(-25 245 48)"/>

  <!-- りんごのみ -->
  <path d="M120 160
           Q80 160 72 220
           Q60 300 90 360
           Q120 420 200 425
           Q280 420 310 360
           Q340 300 328 220
           Q320 160 280 160
           Q260 130 200 130
           Q140 130 120 160Z"
        fill="white" stroke="#222" stroke-width="13"/>

  <!-- くぼみ（上） -->
  <path d="M178 135 Q200 115 222 135" fill="none" stroke="#222" stroke-width="9" stroke-linecap="round"/>

  <!-- かお：めかわいい -->
  <circle cx="162" cy="260" r="16" fill="#222"/>
  <circle cx="169" cy="254" r="6" fill="white"/>
  <circle cx="238" cy="260" r="16" fill="#222"/>
  <circle cx="245" cy="254" r="6" fill="white"/>

  <!-- はな -->
  <ellipse cx="200" cy="290" rx="9" ry="7" fill="#222"/>

  <!-- にっこりくち -->
  <path d="M175 310 Q200 335 225 310" fill="none" stroke="#222" stroke-width="10" stroke-linecap="round"/>

  <!-- ほっぺた -->
  <circle cx="145" cy="300" r="18" fill="none" stroke="#222" stroke-width="7"/>
  <circle cx="255" cy="300" r="18" fill="none" stroke="#222" stroke-width="7"/>
</svg>
