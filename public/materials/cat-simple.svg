<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <!-- 2歳向け・太い線・シンプルなねこ -->

  <!-- しっぽ -->
  <path d="M290 400 Q360 340 330 260" fill="none" stroke="#222" stroke-width="14" stroke-linecap="round"/>

  <!-- からだ -->
  <ellipse cx="200" cy="360" rx="115" ry="95" fill="white" stroke="#222" stroke-width="12"/>

  <!-- あたま -->
  <circle cx="200" cy="195" r="105" fill="white" stroke="#222" stroke-width="12"/>

  <!-- みぎ耳 -->
  <polygon points="280,115 315,55 260,100" fill="white" stroke="#222" stroke-width="12" stroke-linejoin="round"/>

  <!-- ひだり耳 -->
  <polygon points="120,115 85,55 140,100" fill="white" stroke="#222" stroke-width="12" stroke-linejoin="round"/>

  <!-- みぎ目 -->
  <circle cx="235" cy="185" r="20" fill="#222"/>
  <circle cx="243" cy="179" r="7" fill="white"/>

  <!-- ひだり目 -->
  <circle cx="165" cy="185" r="20" fill="#222"/>
  <circle cx="173" cy="179" r="7" fill="white"/>

  <!-- はな -->
  <ellipse cx="200" cy="228" rx="12" ry="9" fill="#222"/>

  <!-- くち -->
  <path d="M183 242 Q200 262 217 242" fill="none" stroke="#222" stroke-width="9" stroke-linecap="round"/>

  <!-- ひだりひげ -->
  <line x1="80" y1="220" x2="180" y2="230" stroke="#222" stroke-width="6" stroke-linecap="round"/>
  <line x1="80" y1="240" x2="180" y2="242" stroke="#222" stroke-width="6" stroke-linecap="round"/>

  <!-- みぎひげ -->
  <line x1="320" y1="220" x2="220" y2="230" stroke="#222" stroke-width="6" stroke-linecap="round"/>
  <line x1="320" y1="240" x2="220" y2="242" stroke="#222" stroke-width="6" stroke-linecap="round"/>

  <!-- ひだりまえあし -->
  <ellipse cx="145" cy="448" rx="38" ry="22" fill="white" stroke="#222" stroke-width="12"/>

  <!-- みぎまえあし -->
  <ellipse cx="255" cy="448" rx="38" ry="22" fill="white" stroke="#222" stroke-width="12"/>
</svg>
