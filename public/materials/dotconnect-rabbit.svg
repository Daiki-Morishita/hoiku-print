<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <!-- 4〜6歳向け 点つなぎ うさぎ（1〜15） -->

  <text x="200" y="32" font-family="sans-serif" font-size="19" font-weight="bold" fill="#222" text-anchor="middle">てんつなぎ うさぎ</text>
  <text x="200" y="54" font-family="sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">1から じゅんばんに せんをひこう！</text>

  <!-- 点の定義（うさぎの外形を構成）番号つき -->
  <!-- 点の座標リスト -->
  <!--
    1: (200, 80)  - 頭頂部
    2: (240, 78)  - 耳右基部
    3: (258, 50)  - 耳右先端
    4: (245, 72)  - 耳右曲がり
    5: (280, 105) - 右頬
    6: (270, 150) - 右あご
    7: (240, 175) - あご右
    8: (200, 185) - あご中央
    9: (160, 175) - あご左
    10: (130, 150) - 左あご
    11: (120, 105) - 左頬
    12: (155, 72) - 耳左曲がり
    13: (142, 50)  - 耳左先端
    14: (160, 78)  - 耳左基部
    15: (200, 80)  - 頭頂部（閉じる）
  -->

  <!-- ガイド用の薄い完成形（正解プレビュー非表示ならコメントアウト） -->
  <!-- 正解アウトライン（超薄く、印刷で消える程度） -->
  <polyline
    points="200,80 240,78 258,50 245,72 280,105 270,150 240,175 200,185 160,175 130,150 120,105 155,72 142,50 160,78 200,80"
    fill="none" stroke="#EEE" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- 目（位置固定） -->
  <circle cx="175" cy="130" r="8" fill="#222"/>
  <circle cx="179" cy="127" r="3" fill="white"/>
  <circle cx="225" cy="130" r="8" fill="#222"/>
  <circle cx="229" cy="127" r="3" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="200" cy="155" rx="6" ry="4" fill="#FF8C69"/>
  <!-- ひげ -->
  <line x1="145" y1="152" x2="190" y2="158" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <line x1="145" y1="162" x2="190" y2="162" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <line x1="210" y1="158" x2="255" y2="152" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <line x1="210" y1="162" x2="255" y2="162" stroke="#222" stroke-width="2" stroke-linecap="round"/>

  <!-- 点と番号 -->
  <!-- 1 -->
  <circle cx="200" cy="80" r="7" fill="#5B9BD5"/>
  <text x="200" y="68" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="middle">1</text>

  <!-- 2 -->
  <circle cx="240" cy="78" r="7" fill="#5B9BD5"/>
  <text x="253" y="74" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="start">2</text>

  <!-- 3 -->
  <circle cx="258" cy="50" r="7" fill="#5B9BD5"/>
  <text x="270" y="46" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="start">3</text>

  <!-- 4 -->
  <circle cx="245" cy="72" r="7" fill="#5B9BD5"/>
  <text x="257" y="68" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="start">4</text>

  <!-- 5 -->
  <circle cx="280" cy="105" r="7" fill="#5B9BD5"/>
  <text x="292" y="101" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="start">5</text>

  <!-- 6 -->
  <circle cx="270" cy="150" r="7" fill="#5B9BD5"/>
  <text x="282" y="146" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="start">6</text>

  <!-- 7 -->
  <circle cx="240" cy="175" r="7" fill="#5B9BD5"/>
  <text x="252" y="171" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="start">7</text>

  <!-- 8 -->
  <circle cx="200" cy="185" r="7" fill="#5B9BD5"/>
  <text x="200" y="202" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="middle">8</text>

  <!-- 9 -->
  <circle cx="160" cy="175" r="7" fill="#5B9BD5"/>
  <text x="144" y="171" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="end">9</text>

  <!-- 10 -->
  <circle cx="130" cy="150" r="7" fill="#5B9BD5"/>
  <text x="114" y="146" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="end">10</text>

  <!-- 11 -->
  <circle cx="120" cy="105" r="7" fill="#5B9BD5"/>
  <text x="104" y="101" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="end">11</text>

  <!-- 12 -->
  <circle cx="155" cy="72" r="7" fill="#5B9BD5"/>
  <text x="140" y="68" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="end">12</text>

  <!-- 13 -->
  <circle cx="142" cy="50" r="7" fill="#5B9BD5"/>
  <text x="126" y="46" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="end">13</text>

  <!-- 14 -->
  <circle cx="160" cy="78" r="7" fill="#5B9BD5"/>
  <text x="144" y="74" font-family="sans-serif" font-size="13" font-weight="bold" fill="#5B9BD5" text-anchor="end">14</text>

  <!-- 15 (= 1) -->
  <!-- ゴールマーク -->
  <circle cx="200" cy="80" r="11" fill="none" stroke="#F97316" stroke-width="2.5" stroke-dasharray="3,2"/>

  <!-- 胴体・足（別に描画） -->
  <!-- 胴体 -->
  <ellipse cx="200" cy="290" rx="60" ry="75" fill="white" stroke="#222" stroke-width="9"/>
  <!-- 前足（左） -->
  <path d="M155 320 Q130 345 125 370 Q125 385 140 385 Q155 385 158 370 Q160 355 165 340" fill="none" stroke="#222" stroke-width="9" stroke-linecap="round"/>
  <!-- 前足（右） -->
  <path d="M245 320 Q270 345 275 370 Q275 385 260 385 Q245 385 242 370 Q240 355 235 340" fill="none" stroke="#222" stroke-width="9" stroke-linecap="round"/>
  <!-- 後足（左） -->
  <ellipse cx="162" cy="370" rx="30" ry="16" fill="white" stroke="#222" stroke-width="8"/>
  <!-- 後足（右） -->
  <ellipse cx="238" cy="370" rx="30" ry="16" fill="white" stroke="#222" stroke-width="8"/>
  <!-- おなか -->
  <ellipse cx="200" cy="295" rx="30" ry="40" fill="white" stroke="#222" stroke-width="6"/>
  <!-- しっぽ -->
  <circle cx="258" cy="265" r="18" fill="white" stroke="#222" stroke-width="8"/>

  <!-- 仕上げガイド -->
  <text x="200" y="440" font-family="sans-serif" font-size="12" fill="#6B7280" text-anchor="middle">できたら うさぎを ぬってみよう！</text>
</svg>
