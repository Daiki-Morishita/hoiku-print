<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- 2〜5歳向け ゆきだるま ぬりえ -->

  <!-- タイトル -->
  <text x="200" y="32" font-family="sans-serif" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">ゆきだるま ぬりえ</text>
  <text x="200" y="54" font-family="sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">すきないろで ぬってみよう！</text>

  <!-- 地面 -->
  <path d="M30 445 Q200 430 370 445" fill="none" stroke="#222" stroke-width="8" stroke-linecap="round"/>

  <!-- からだ（下） -->
  <circle cx="200" cy="380" r="80" fill="white" stroke="#222" stroke-width="10"/>

  <!-- からだ（上） -->
  <circle cx="200" cy="240" r="58" fill="white" stroke="#222" stroke-width="10"/>

  <!-- マフラー -->
  <path d="M148 268 Q200 278 252 268 Q258 260 252 255 Q200 265 148 255 Q142 260 148 268Z"
        fill="white" stroke="#222" stroke-width="8" stroke-linejoin="round"/>
  <!-- マフラーの垂れ -->
  <path d="M163 265 Q158 288 162 305" fill="none" stroke="#222" stroke-width="9" stroke-linecap="round"/>

  <!-- ぼうし（シルクハット） -->
  <rect x="158" y="158" width="84" height="12" rx="5" fill="white" stroke="#222" stroke-width="9"/>
  <rect x="172" y="88" width="56" height="72" rx="6" fill="white" stroke="#222" stroke-width="9"/>

  <!-- 目（左） -->
  <circle cx="183" cy="228" r="8" fill="#222"/>
  <!-- 目（右） -->
  <circle cx="217" cy="228" r="8" fill="#222"/>

  <!-- 鼻（にんじん） -->
  <path d="M200 238 L218 243 L200 248Z" fill="#222"/>

  <!-- 口（ぼタン列） -->
  <circle cx="192" cy="256" r="4" fill="#222"/>
  <circle cx="200" cy="259" r="4" fill="#222"/>
  <circle cx="208" cy="256" r="4" fill="#222"/>

  <!-- からだのボタン -->
  <circle cx="200" cy="330" r="6" fill="#222"/>
  <circle cx="200" cy="360" r="6" fill="#222"/>
  <circle cx="200" cy="390" r="6" fill="#222"/>

  <!-- てぶくろ（左） -->
  <path d="M122 355 Q90 345 75 350 Q65 356 68 365 Q73 374 85 370 Q95 367 110 370"
        fill="white" stroke="#222" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 指（左） -->
  <path d="M75 353 Q68 340 74 335" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round"/>
  <path d="M68 365 Q59 358 64 351" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round"/>

  <!-- てぶくろ（右） -->
  <path d="M278 355 Q310 345 325 350 Q335 356 332 365 Q327 374 315 370 Q305 367 290 370"
        fill="white" stroke="#222" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 指（右） -->
  <path d="M325 353 Q332 340 326 335" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round"/>
  <path d="M332 365 Q341 358 336 351" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round"/>

  <!-- 雪（背景） -->
  <circle cx="60" cy="100" r="6" fill="white" stroke="#CBD5E1" stroke-width="3"/>
  <circle cx="340" cy="85" r="5" fill="white" stroke="#CBD5E1" stroke-width="3"/>
  <circle cx="350" cy="140" r="7" fill="white" stroke="#CBD5E1" stroke-width="3"/>
  <circle cx="45" cy="170" r="5" fill="white" stroke="#CBD5E1" stroke-width="3"/>
  <circle cx="80" cy="80" r="4" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="320" cy="120" r="4" fill="white" stroke="#CBD5E1" stroke-width="2"/>
</svg>
