  <path d="M163 268 Q185 260 207 268" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round"/>
  <path d="M158 295 Q185 287 212 295" fill="none" stroke="#222" stroke-width="5" stroke-linecap="round"/>

