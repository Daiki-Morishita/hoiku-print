  <path d="M163 228 Q138 278 158 325 Q170 352 185 350 Q200 352 212 325 Q232 278 207 228" fill="white" stroke="#222" stroke-width="10" stroke-linejoin="round"/>
  <ellipse cx="185" cy="346" rx="22" ry="15" fill="white" stroke="#222" stroke-width="8"/>
