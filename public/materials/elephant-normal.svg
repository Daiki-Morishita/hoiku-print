  <path d="M135 143 Q148 136 162 143" fill="none" stroke="#222" stroke-width="6" stroke-linecap="round"/>
  <path d="M209 143 Q222 136 236 143" fill="none" stroke="#222" stroke-width="6" stroke-linecap="round"/>

