  <ellipse cx="128" cy="448" rx="44" ry="25" fill="white" stroke="#222" stroke-width="10"/>
  <!-- ひだりうしろあし -->
  <ellipse cx="88" cy="450" rx="38" ry="22" fill="white" stroke="#222" stroke-width="9"/>

  <!-- みぎまえあし -->
