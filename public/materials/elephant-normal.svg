  <!-- ひだり目 -->
  <circle cx="148" cy="160" r="16" fill="#222"/>
  <circle cx="155" cy="154" r="5" fill="white"/>

  <!-- みぎ目 -->
  <circle cx="222" cy="160" r="16" fill="#222"/>
  <circle cx="229" cy="154" r="5" fill="white"/>

