<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <!-- 2歳向け・太い線・シンプルなくま -->

  <!-- からだ -->
  <ellipse cx="200" cy="360" rx="120" ry="100" fill="white" stroke="#222" stroke-width="12"/>

  <!-- あたま -->
  <circle cx="200" cy="190" r="108" fill="white" stroke="#222" stroke-width="12"/>

  <!-- みぎ耳 -->
  <circle cx="295" cy="105" r="38" fill="white" stroke="#222" stroke-width="12"/>
  <circle cx="295" cy="105" r="22" fill="white" stroke="#222" stroke-width="8"/>

  <!-- ひだり耳 -->
  <circle cx="105" cy="105" r="38" fill="white" stroke="#222" stroke-width="12"/>
  <circle cx="105" cy="105" r="22" fill="white" stroke="#222" stroke-width="8"/>

  <!-- みぎ目 -->
  <circle cx="238" cy="178" r="19" fill="#222"/>
  <circle cx="246" cy="172" r="6" fill="white"/>

  <!-- ひだり目 -->
  <circle cx="162" cy="178" r="19" fill="#222"/>
  <circle cx="170" cy="172" r="6" fill="white"/>

  <!-- はなのまるい部分 -->
  <ellipse cx="200" cy="225" rx="38" ry="28" fill="white" stroke="#222" stroke-width="10"/>

  <!-- はな -->
  <ellipse cx="200" cy="218" rx="13" ry="10" fill="#222"/>

  <!-- くち -->
  <path d="M182 238 Q200 255 218 238" fill="none" stroke="#222" stroke-width="9" stroke-linecap="round"/>

  <!-- ひだりまえあし -->
  <ellipse cx="143" cy="450" rx="40" ry="23" fill="white" stroke="#222" stroke-width="12"/>

  <!-- みぎまえあし -->
  <ellipse cx="257" cy="450" rx="40" ry="23" fill="white" stroke="#222" stroke-width="12"/>

  <!-- おなかのまる -->
  <ellipse cx="200" cy="355" rx="65" ry="55" fill="white" stroke="#222" stroke-width="9"/>
</svg>
