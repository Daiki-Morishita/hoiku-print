  <circle cx="1100" cy="530" r="120" fill="#bbf7d0" opacity="0.4"/>
  <circle cx="1050" cy="80" r="60" fill="#fde68a" opacity="0.4"/>
  <circle cx="150" cy="550" r="90" fill="#ddd6fe" opacity="0.3"/>
  <!-- Logo area -->
  <rect x="540" y="160" width="120" height="120" rx="24" fill="#2563eb"/>
  <rect x="568" y="190" width="64" height="8" rx="4" fill="white"/>
  <rect x="568" y="206" width="64" height="8" rx="4" fill="white"/>
  <rect x="568" y="222" width="64" height="8" rx="4" fill="white"/>
  <rect x="568" y="246" width="24" height="8" rx="4" fill="white"/>
  <rect x="600" y="246" width="32" height="8" rx="4" fill="white" opacity="0.6"/>
