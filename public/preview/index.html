<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>UI比較</title>
<style>
  body { font-family: sans-serif; background: #f5f5f5; padding: 40px; max-width: 800px; margin: 0 auto; }
  h1 { margin-bottom: 24px; }
  .card {
    background: white;
    padding: 24px;
    border-radius: 8px;
    margin-bottom: 16px;
    border: 1px solid #ddd;
  }
  .card a {
    display: inline-block;
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 4px;
    text-decoration: none;
    margin-top: 12px;
  }
  h2 { margin-bottom: 8px; }
  .meta { color: #777; font-size: 13px; }
</style>
</head>
<body>
<h1>UI 案 比較</h1>

<div class="card">
  <h2>案1: ほぼ日 × Shutterstock</h2>
  <p>ブランド・編集感重視。明朝・クリーム背景・朱色アクセント。差別化最強だがSEO速度は中。</p>
  <a href="/preview/option1.html">案1 を見る →</a>
</div>

<div class="card">
  <h2>案2: 純粋SEO特化</h2>
  <p>情報密度MAX。ピラー記事・タグクラウド・FAQ・メガメニュー。SEO速度は最速だがブランド価値は薄い。</p>
  <a href="/preview/option2.html">案2 を見る →</a>
</div>

<div class="card">
  <h2>案3: 足し算（推奨）</h2>
  <p>ビジュアルは案1、骨格は案2。明朝＋セリフ感を残しつつ、メガメニュー・ピラー・FAQ・編集者コメントも全部入り。</p>
  <a href="/preview/option3.html">案3 を見る →</a>
</div>

<p style="margin-top:40px; color:#777; font-size:13px;">
※ プロトタイプは静的HTMLです。実装時はNext.jsコンポーネントとして組み直します。
</p>
</body>
</html>
